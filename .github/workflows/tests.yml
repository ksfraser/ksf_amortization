name: PHP Tests & Code Quality

on:
  push:
    branches: [ main, develop, phase-1-* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ksf_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        php-version: ['8.2']

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php-action@v2
      with:
        php-version: ${{ matrix.php-version }}
        coverage: xdebug
        extensions: mbstring, pdo_mysql, redis

    - name: Get composer cache directory
      id: composer-cache
      run: echo "::set-output name=dir::$(composer config cache-files-dir)"

    - name: Cache composer dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Setup environment
      run: |
        cp .env.example .env.testing
        php artisan key:generate --env=testing

    - name: Run migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: ksf_test
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan migrate --env=testing

    - name: Run PHPUnit Tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: ksf_test
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan test --coverage --coverage-html=coverage

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/index.html
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php-action@v2
      with:
        php-version: 8.2
        extensions: mbstring

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Run PHPStan
      run: ./vendor/bin/phpstan analyse --memory-limit=512M || true

    - name: Run Psalm
      run: ./vendor/bin/psalm || true

    - name: Check code style (Pint)
      run: ./vendor/bin/pint --test || true

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run security check
      run: curl https://security.sensiolabs.org/check_lock -F lock=@composer.lock
