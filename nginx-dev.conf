events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Upstream PHP-FPM
  upstream php_fpm {
      server php:9000;
  }

  # Upstream Node (Vue dev server)
  upstream node_app {
      server node:5173;
  }

  server {
    listen 80;
    server_name localhost;
    root /app;

    client_max_body_size 10M;

    # Vue SPA (dev mode)
    location / {
      proxy_pass http://node_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API requests
    location /api/ {
      try_files $uri $uri/ /api/index.php$request_uri;
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_NAME /api/index.php;
      fastcgi_param SCRIPT_FILENAME /app/src/Ksfraser/Api/index.php;
      fastcgi_param PATH_INFO $uri;
    }

    # FrontAccounting module (if accessed directly)
    location /modules/amortization/ {
      try_files $uri $uri/ /modules/amortization/controller.php$is_args$args;
      fastcgi_pass php_fpm;
      fastcgi_index controller.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
    }

    # PHP files
    location ~ \.php$ {
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
    }
  }
}
