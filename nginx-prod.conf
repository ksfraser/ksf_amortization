events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/xml application/json application/javascript;
  gzip_min_length 1000;

  # Upstream PHP-FPM
  upstream php_fpm {
      server api:9000;
  }

  # HTTP redirect to HTTPS
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL configuration
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /app;
    client_max_body_size 10M;
    error_log /var/log/nginx/error.log warn;

    # Vue SPA (static files)
    location /app/ {
      alias /app/frontend/dist/;
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public";
    }

    # API requests
    location /api/ {
      try_files $uri $uri/ /api/index.php$request_uri;
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_NAME /api/index.php;
      fastcgi_param SCRIPT_FILENAME /app/src/Ksfraser/Api/index.php;
      fastcgi_param PATH_INFO $uri;

      # Add CORS headers for API
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

      # Caching (short-lived for API)
      expires 1m;
      add_header Cache-Control "public, max-age=60";
    }

    # Health check
    location /api/health {
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /app/src/Ksfraser/Api/index.php;

      # No caching for health checks
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # FrontAccounting module (optional)
    location /modules/amortization/ {
      try_files $uri $uri/ /modules/amortization/controller.php$is_args$args;
      fastcgi_pass php_fpm;
      fastcgi_index controller.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
    }

    # PHP files
    location ~ \.php$ {
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
    }
    location ~ ~$ {
      deny all;
    }

    # Root redirect
    location = / {
      return 301 /app/;
    }
  }
}
